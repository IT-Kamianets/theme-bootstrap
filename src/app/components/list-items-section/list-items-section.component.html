<section class="list-items-section">
	<div class="container py-5">
		<!-- Section Header -->
		<div class="d-flex flex-column gap-1 flex-sm-row align-items-sm-end justify-content-sm-between mb-5">
			<div>
				<h2 class="section-title mb-2">{{ title() }}</h2>
				<p class="section-subtitle mb-0">{{ subtitle() }}</p>
			</div>
		</div>

		<!-- Projects Wrapper -->
		<div class="projects-wrapper">
			<div class="row g-4 justify-content-center">
				@for (project of displayProducts(); track project.id) {
					<div class="col-12 col-md-6 col-lg-4">
						<app-list-item
							[product]="project"
							(viewProject)="onViewProject($event)"
						></app-list-item>
					</div>
				}
			</div>
		</div>

		<!-- View All Button -->
		@if (showViewAll()) {
			<div class="text-center mt-5">
				<button class="btn btn-primary btn-lg px-4 rounded-pill" (click)="navigateToList()">
					{{ viewAllText() }}
				</button>
			</div>
		}
	</div>
</section>
